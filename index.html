<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نظام التمارين والتغذية</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .container { padding: 2rem; max-width: 500px; }
    h1 { font-size: 2rem; margin-bottom: 1rem; color: #22c55e; }
    p { color: #888; margin-bottom: 1.5rem; line-height: 1.6; }
    .btn {
      display: inline-block;
      background: #22c55e;
      color: white;
      padding: 0.75rem 2rem;
      border-radius: 0.5rem;
      text-decoration: none;
      font-weight: 500;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.9; }
    .features { text-align: right; margin-top: 2rem; }
    .features li { 
      list-style: none; 
      padding: 0.5rem 0; 
      border-bottom: 1px solid #222;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .features li::before { content: "✓"; color: #22c55e; }
  </style>
</head>
<body>
  <div class="container">
    <h1>نظام التمارين والتغذية</h1>
    <p>تطبيق متابعة التمارين والتغذية وتتبع الوزن</p>
    <p style="font-size: 0.875rem; color: #666;">
      للوصول للتطبيق، يجب تشغيل الخادم باستخدام:<br>
      <code style="background: #1a1a1a; padding: 0.25rem 0.5rem; border-radius: 0.25rem; display: inline-block; margin-top: 0.5rem;">npm start</code>
    </p>
    <ul class="features">
      <li>تمرين اليوم تلقائياً</li>
      <li>خطة أسبوعية قابلة للتعديل</li>
      <li>تتبع الوزن برسم بياني</li>
      <li>أرشيف صور InBody</li>
      <li>نظام غذائي كامل</li>
    </ul>
  </div>
</body>
</html>
